# Codex CLI Configuration File

# Model reasoning effort - controls AI's reasoning depth
# Options: "low", "medium", "high"
# Recommended: "high" for more comprehensive responses
model_reasoning_effort = "xhigh"

# Hide internal AI reasoning process to reduce verbose output
hide_agent_reasoning = true

model = "gpt-5.4"
personality = "pragmatic"

# Enable web search functionality
[features]
web_search_request = true

# Enable network access for web browsing and API calls
[sandbox_workspace_write]
network_access = true

# Notification settings
# Play sound when task completes (macOS specific)
notify = ["bash", "-lc", "afplay /System/Library/Sounds/Ping.aiff"]

# Trusted projects configuration
projects = { "/Users/takumiakasaka/Git-Project/github.com/supsysjp/boba-server" = { trust_level = "trusted" } , "/Users/takumiakasaka/Git-Project/github.com/supsysjp/boba-schema" = { trust_level = "trusted" } , "/Users/takumiakasaka/Git-Project/github.com/eyday/eyday" = { trust_level = "trusted" } , "/Users/takumiakasaka/Git-Project/github.com/wedinc/one-admin" = { trust_level = "trusted" } , "/Users/takumiakasaka/Git-Project/github.com/supsysjp/zero-gcp-resources" = { trust_level = "trusted" } }

[projects."/Users/knao124/dev"]
trust_level = "trusted"

[projects."/Users/knao124/dev/ridgebull/ai-ocr-agent"]
trust_level = "trusted"

[projects."/Users/knao124/dev/dhk/canvas-light-streaming-engine"]
